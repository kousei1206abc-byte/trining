<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最速計画｜1年間トレーニングメニュー</title>
    <style>
        :root {
            /* Colors */
            --primary-color: #0b101e;
            --secondary-color: #1a233a;
            --accent-color: #ff6d00;
            --text-main: #f8f9fa;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
            --bg-body: #050814;
            --bg-card: #111827;
            --bg-hover: #1f2937;
            
            /* Tags */
            --tag-jog: #4CAF50;
            --tag-point: #F44336;
            --tag-pace: #2196F3;
            --tag-interval: #D32F2F;
            --tag-rep: #C2185B;
            --tag-long: #388E3C;
            --tag-recovery: #00BCD4;
            --tag-strength: #795548;
            --tag-rest: #9E9E9E;
            --tag-race: #9C27B0;
            --tag-800: #E91E63;
            --tag-1500: #FF9800;
            --tag-5000: #FF5722;
            --tag-base: #8BC34A;
            --tag-threshold: #3F51B5;
            --tag-speed: #0097A7;
            --tag-racepace: #FF6D00;

            --font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3 { font-weight: 700; letter-spacing: 0.05em; }
        
        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 30px;
            background-color: var(--accent-color);
            transform: skewX(-15deg);
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .card-value.highlight {
            color: var(--accent-color);
        }

        /* Today's Special Card */
        .today-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border-left: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .today-card .card-value {
            font-size: 1.4rem;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .search-input, .select-input {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-body);
            color: white;
            font-size: 1rem;
        }

        .search-input { flex: 1; min-width: 200px; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 0.95rem;
        }
        .btn:hover { opacity: 0.8; }
        
        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-secondary { background-color: var(--border-color); color: white; }
        .btn-danger { background-color: var(--tag-interval); color: white; }

        /* Calendar Controls */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .month-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .month-nav h2 {
            font-size: 1.5rem;
            min-width: 120px;
            text-align: center;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: var(--text-muted);
            padding: 10px 0;
        }

        .day-cell {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 120px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .day-cell:hover {
            border-color: var(--accent-color);
            background-color: var(--bg-hover);
        }

        .day-cell.empty {
            background-color: transparent;
            border: none;
            cursor: default;
        }

        .day-cell.today {
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 109, 0, 0.3);
        }

        .day-cell.high-fatigue {
            border-bottom: 3px solid var(--tag-interval);
        }

        .date-num {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            display: inline-block;
        }

        .day-cell.today .date-num {
            color: var(--accent-color);
        }

        .day-title {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 5px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            display: inline-block;
        }

        .day-details {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-body);
            color: white;
            font-family: inherit;
        }
        
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            background: var(--bg-body);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .checkbox-label:hover {
            border-color: var(--accent-color);
        }

        .checkbox-label input:checked + span {
            color: var(--accent-color);
            font-weight: bold;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .weekday { display: none; }
            .day-cell { min-height: auto; display: flex; flex-direction: column; }
            .day-cell.empty { display: none; }
            .date-num { border-bottom: 1px solid var(--border-color); margin-bottom: 10px; padding-bottom: 5px; }
            
            .controls { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>最速計画｜1年間トレーニングメニュー</h1>
        <div id="current-year-display" style="font-size: 1.2rem; font-weight: bold; color: var(--text-muted);"></div>
    </header>

    <main>
        <!-- ダッシュボード -->
        <section class="dashboard" id="dashboard">
            <div class="card today-card">
                <div class="card-title">今日の練習</div>
                <div class="card-value highlight" id="today-title">--</div>
                <div id="today-details" style="font-size: 0.9rem; color: #ccc;">--</div>
            </div>
            <div class="card">
                <div class="card-title">今月の走行距離</div>
                <div class="card-value"><span id="stat-distance">0</span> <span style="font-size: 1rem;">km</span></div>
            </div>
            <div class="card">
                <div class="card-title">今週のポイント練習</div>
                <div class="card-value"><span id="stat-points">0</span> <span style="font-size: 1rem;">回</span></div>
            </div>
            <div class="card">
                <div class="card-title">今月の達成率</div>
                <div class="card-value"><span id="stat-achievement">0</span> <span style="font-size: 1rem;">%</span></div>
            </div>
            <div class="card">
                <div class="card-title">次の重要練習</div>
                <div class="card-value" id="stat-next-important" style="font-size: 1.2rem;">--</div>
            </div>
        </section>

        <!-- コントロールパネル -->
        <section class="controls">
            <div class="filters">
                <input type="text" id="search-input" class="search-input" placeholder="練習メニューを検索...">
                <select id="tag-filter" class="select-input">
                    <option value="">すべてのタグ</option>
                    <!-- JavaScriptで追加 -->
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-secondary" onclick="exportData()">バックアップ (JSON)</button>
                <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">インポート</button>
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
                <button class="btn btn-danger" onclick="resetData()">リセット</button>
            </div>
        </section>

        <!-- カレンダー -->
        <section class="calendar-section">
            <div class="calendar-header">
                <div class="month-nav">
                    <button class="btn btn-secondary" onclick="changeMonth(-1)">◀ 前月</button>
                    <h2 id="current-month-display">--月</h2>
                    <button class="btn btn-secondary" onclick="changeMonth(1)">次月 ▶</button>
                </div>
                <button class="btn btn-secondary" onclick="goToToday()">今日に戻る</button>
            </div>

            <div class="calendar-grid" id="calendar-grid">
                <!-- 曜日ヘッダー -->
                <div class="weekday">日</div>
                <div class="weekday">月</div>
                <div class="weekday">火</div>
                <div class="weekday">水</div>
                <div class="weekday">木</div>
                <div class="weekday">金</div>
                <div class="weekday">土</div>
                <!-- 日付セルはJSで生成 -->
            </div>
        </section>
    </main>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-date-title">日付の編集</h2>
            <button class="btn btn-secondary" onclick="closeModal()" style="padding: 5px 10px;">✕</button>
        </div>
        <form id="edit-form" onsubmit="saveMenu(event)">
            <input type="hidden" id="edit-date">
            
            <div class="form-group">
                <label>練習タイトル</label>
                <input type="text" id="edit-title" class="form-control" placeholder="例：1000m×5 ペース走">
            </div>

            <div class="form-group">
                <label>タグ（複数選択可）</label>
                <div class="checkbox-group" id="edit-tags-container">
                    <!-- JSで生成 -->
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>距離</label>
                    <input type="text" id="edit-distance" class="form-control" placeholder="例：12km">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>設定ペース</label>
                    <input type="text" id="edit-pace" class="form-control" placeholder="例：3'00/km">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>レスト</label>
                    <input type="text" id="edit-rest" class="form-control" placeholder="例：200m(60s)">
                </div>
            </div>

            <div class="form-group">
                <label>メニュー内容</label>
                <textarea id="edit-content" class="form-control" placeholder="詳細なメニュー内容..."></textarea>
            </div>

            <div class="form-group">
                <label>目的</label>
                <input type="text" id="edit-purpose" class="form-control" placeholder="例：LT値の向上">
            </div>

            <div class="form-group">
                <label>メモ</label>
                <textarea id="edit-memo" class="form-control" placeholder="気づいたことなど..."></textarea>
            </div>

            <div class="form-group">
                <label>疲労度: <span id="fatigue-val">3</span>/5</label>
                <input type="range" id="edit-fatigue" min="1" max="5" value="3" oninput="document.getElementById('fatigue-val').innerText = this.value">
                <small style="color: var(--text-muted); display:block; margin-top:5px;">※4以上でカレンダーに警告表示</small>
            </div>

            <div class="form-group">
                <label>達成度: <span id="achievement-val">0</span>%</label>
                <input type="range" id="edit-achievement" min="0" max="100" step="5" value="0" oninput="document.getElementById('achievement-val').innerText = this.value">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
                <button type="submit" class="btn btn-primary">保存する</button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- Constants & Config ---
    const TAG_COLORS = {
        'ジョグ': 'var(--tag-jog)',
        'ポイント': 'var(--tag-point)',
        'ペース走': 'var(--tag-pace)',
        'インターバル': 'var(--tag-interval)',
        'レペティション': 'var(--tag-rep)',
        'ロング走': 'var(--tag-long)',
        '回復': 'var(--tag-recovery)',
        '補強': 'var(--tag-strength)',
        '休養': 'var(--tag-rest)',
        '試合': 'var(--tag-race)',
        '800m': 'var(--tag-800)',
        '1500m': 'var(--tag-1500)',
        '5000m': 'var(--tag-5000)',
        '土台作り': 'var(--tag-base)',
        '閾値': 'var(--tag-threshold)',
        'スピード持久': 'var(--tag-speed)',
        'レースペース': 'var(--tag-racepace)'
    };
    
    const STORAGE_KEY = 'saisoku_plan_data';
    
    // --- State ---
    let appData = {}; // { 'YYYY-MM-DD': { title: '', ... } }
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth(); // 0-11
    let todayStr = formatDate(new Date());

    // --- Initialization ---
    function init() {
        document.getElementById('current-year-display').innerText = `${currentYear} Season`;
        
        // Setup Tag Filters
        const tagFilter = document.getElementById('tag-filter');
        const editTagsContainer = document.getElementById('edit-tags-container');
        
        for (const tag in TAG_COLORS) {
            // Filter option
            const opt = document.createElement('option');
            opt.value = tag;
            opt.innerText = tag;
            tagFilter.appendChild(opt);

            // Checkbox in modal
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.innerHTML = `
                <input type="checkbox" name="tags" value="${tag}" style="display:none;">
                <span style="color: ${TAG_COLORS[tag]}; font-size: 1.2rem;">●</span>
                <span>${tag}</span>
            `;
            editTagsContainer.appendChild(label);
        }

        // Event Listeners for Filters
        document.getElementById('search-input').addEventListener('input', renderCalendar);
        document.getElementById('tag-filter').addEventListener('change', renderCalendar);

        // Load Data
        loadData();
    }

    // --- Data Management ---
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            appData = JSON.parse(stored);
        } else {
            generateSampleData();
            saveData();
        }
        renderApp();
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function generateSampleData() {
        appData = {};
        for (let m = 0; m < 12; m++) {
            let daysInMonth = new Date(currentYear, m + 1, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                let dateObj = new Date(currentYear, m, d);
                let dateStr = formatDate(dateObj);
                let dayOfWeek = dateObj.getDay();
                let phase = m < 3 ? 1 : m < 6 ? 2 : m < 9 ? 3 : 4; // 四半期
                
                let entry = {
                    title: '', content: '', distance: '', pace: '', rest: '',
                    purpose: '', memo: '', fatigue: 2, achievement: 0, tags: []
                };

                // 簡易自動割当
                if (dayOfWeek === 1) { // 月曜
                    entry.title = '休養'; entry.tags = ['休養']; entry.fatigue = 1;
                } else if (dayOfWeek === 3 || dayOfWeek === 6) { // 水・土：ポイント
                    entry.tags = ['ポイント'];
                    entry.fatigue = 4;
                    if (phase === 1) {
                        entry.title = dayOfWeek === 3 ? '8km ペース走' : '坂ダッシュ 10本';
                        entry.tags.push(dayOfWeek === 3 ? 'ペース走' : '土台作り');
                        entry.distance = dayOfWeek === 3 ? '8km' : '3km';
                    } else if (phase === 2) {
                        entry.title = dayOfWeek === 3 ? '400m×10' : '6kmペース走';
                        entry.tags.push(dayOfWeek === 3 ? 'インターバル' : 'スピード持久');
                        entry.distance = '8km';
                    } else if (phase === 3) {
                        entry.title = dayOfWeek === 3 ? '600m×5' : '1000m×3';
                        entry.tags.push('レースペース');
                        entry.distance = '7km';
                    } else {
                        entry.title = dayOfWeek === 3 ? '1000m×5' : '5000mTT';
                        entry.tags.push(dayOfWeek === 3 ? 'インターバル' : '試合');
                        entry.distance = '8km';
                    }
                } else if (dayOfWeek === 0) { // 日：ロング走
                    entry.title = 'ロング走'; entry.tags = ['ロング走']; 
                    entry.distance = phase === 1 ? '20km' : '15km';
                    entry.fatigue = 4;
                } else { // 火・木・金：ジョグ
                    entry.title = 'ジョグ'; entry.tags = ['ジョグ']; 
                    entry.distance = '10km'; entry.fatigue = 2;
                }
                
                // 過去の日付は達成度を適当に入れる
                if (dateObj < new Date()) {
                    entry.achievement = Math.floor(Math.random() * 30) + 70; // 70-100
                }

                appData[dateStr] = entry;
            }
        }
    }

    // --- Rendering ---
    function renderApp() {
        renderDashboard();
        renderCalendar();
    }

    function renderDashboard() {
        const todayEntry = appData[todayStr] || {};
        
        // 今日の練習
        document.getElementById('today-title').innerText = todayEntry.title || '予定なし';
        let todayDet = [];
        if(todayEntry.distance) todayDet.push(`距離: ${todayEntry.distance}`);
        if(todayEntry.pace) todayDet.push(`ペース: ${todayEntry.pace}`);
        document.getElementById('today-details').innerText = todayDet.join(' | ') || '詳細なし';

        // 月間走行距離計算
        let monthlyDistance = 0;
        let pointsCount = 0;
        let restCount = 0;
        let achievementTotal = 0;
        let achievementCount = 0;
        let nextImportant = '--';

        const todayDate = new Date();
        const startOfWeek = new Date(todayDate);
        startOfWeek.setDate(todayDate.getDate() - todayDate.getDay()); // Sunday
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);

        // データの集計
        for (const [dateStr, entry] of Object.entries(appData)) {
            const entryDate = new Date(dateStr);
            
            // 今月分
            if (entryDate.getMonth() === todayDate.getMonth() && entryDate.getFullYear() === todayDate.getFullYear()) {
                if (entry.distance) {
                    const num = parseFloat(entry.distance.replace(/[^0-9.]/g, ''));
                    if (!isNaN(num)) monthlyDistance += num;
                }
                if (entryDate <= todayDate && entry.achievement > 0) {
                    achievementTotal += parseInt(entry.achievement);
                    achievementCount++;
                }
            }

            // 今週分
            if (entryDate >= startOfWeek && entryDate <= endOfWeek) {
                if (entry.tags && entry.tags.includes('ポイント')) pointsCount++;
                if (entry.tags && entry.tags.includes('休養')) restCount++;
            }

            // 次の重要練習
            if (entryDate >= todayDate && nextImportant === '--') {
                if (entry.tags && (entry.tags.includes('ポイント') || entry.tags.includes('試合'))) {
                    nextImportant = `${entryDate.getMonth()+1}/${entryDate.getDate()} ${entry.title}`;
                }
            }
        }

        document.getElementById('stat-distance').innerText = Math.round(monthlyDistance);
        document.getElementById('stat-points').innerText = pointsCount;
        document.getElementById('stat-achievement').innerText = achievementCount > 0 ? Math.round(achievementTotal / achievementCount) : 0;
        document.getElementById('stat-next-important').innerText = nextImportant;
    }

    function renderCalendar() {
        document.getElementById('current-month-display').innerText = `${currentMonth + 1}月`;
        const grid = document.getElementById('calendar-grid');
        
        // ヘッダー（曜日）は残すので、セルだけ削除
        const cells = grid.querySelectorAll('.day-cell, .empty');
        cells.forEach(c => c.remove());

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        const searchQuery = document.getElementById('search-input').value.toLowerCase();
        const tagQuery = document.getElementById('tag-filter').value;

        // 空白セル
        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        // 日付セル
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(currentYear, currentMonth, d);
            const dateStr = formatDate(dateObj);
            const entry = appData[dateStr] || { tags: [] };

            // フィルタリング
            let isVisible = true;
            if (searchQuery) {
                const text = `${entry.title} ${entry.content} ${entry.memo}`.toLowerCase();
                if (!text.includes(searchQuery)) isVisible = false;
            }
            if (tagQuery && (!entry.tags || !entry.tags.includes(tagQuery))) {
                isVisible = false;
            }

            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (dateStr === todayStr) cell.classList.add('today');
            if (entry.fatigue >= 4) cell.classList.add('high-fatigue');

            // フィルタに引っかかった場合は半透明にするか非表示にする
            if (!isVisible) {
                cell.style.opacity = '0.2';
            }

            cell.onclick = () => openModal(dateStr);

            let tagsHtml = '';
            if (entry.tags) {
                tagsHtml = `<div class="tags-container">` + 
                    entry.tags.map(t => `<span class="tag" style="background-color: ${TAG_COLORS[t] || '#666'}">${t}</span>`).join('') +
                    `</div>`;
            }

            let detailsHtml = '';
            if(entry.distance) detailsHtml += `<span>D: ${entry.distance}</span> `;
            if(entry.pace) detailsHtml += `<span>P: ${entry.pace}</span>`;

            cell.innerHTML = `
                <div class="date-num">${d}</div>
                ${tagsHtml}
                <div class="day-title">${entry.title || '-'}</div>
                <div class="day-details">${detailsHtml}</div>
                ${entry.achievement > 0 ? `<div style="font-size:0.7rem; color:var(--accent-color); margin-top:2px;">達成: ${entry.achievement}%</div>` : ''}
            `;
            grid.appendChild(cell);
        }
    }

    // --- Interaction ---
    function changeMonth(delta) {
        currentMonth += delta;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
            document.getElementById('current-year-display').innerText = `${currentYear} Season`;
        } else if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
            document.getElementById('current-year-display').innerText = `${currentYear} Season`;
        }
        renderCalendar();
    }

    function goToToday() {
        const d = new Date();
        currentYear = d.getFullYear();
        currentMonth = d.getMonth();
        document.getElementById('current-year-display').innerText = `${currentYear} Season`;
        renderCalendar();
    }

    function openModal(dateStr) {
        const entry = appData[dateStr] || {
            title: '', content: '', distance: '', pace: '', rest: '',
            purpose: '', memo: '', fatigue: 3, achievement: 0, tags: []
        };

        document.getElementById('edit-date').value = dateStr;
        document.getElementById('modal-date-title').innerText = `${dateStr} のメニュー編集`;
        
        document.getElementById('edit-title').value = entry.title || '';
        document.getElementById('edit-content').value = entry.content || '';
        document.getElementById('edit-distance').value = entry.distance || '';
        document.getElementById('edit-pace').value = entry.pace || '';
        document.getElementById('edit-rest').value = entry.rest || '';
        document.getElementById('edit-purpose').value = entry.purpose || '';
        document.getElementById('edit-memo').value = entry.memo || '';
        
        document.getElementById('edit-fatigue').value = entry.fatigue || 3;
        document.getElementById('fatigue-val').innerText = entry.fatigue || 3;
        
        document.getElementById('edit-achievement').value = entry.achievement || 0;
        document.getElementById('achievement-val').innerText = entry.achievement || 0;

        // Tags
        const checkboxes = document.querySelectorAll('input[name="tags"]');
        checkboxes.forEach(cb => {
            cb.checked = entry.tags && entry.tags.includes(cb.value);
        });

        document.getElementById('edit-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('active');
    }

    function saveMenu(e) {
        e.preventDefault();
        const dateStr = document.getElementById('edit-date').value;
        
        const checkedTags = Array.from(document.querySelectorAll('input[name="tags"]:checked')).map(cb => cb.value);

        appData[dateStr] = {
            title: document.getElementById('edit-title').value,
            content: document.getElementById('edit-content').value,
            distance: document.getElementById('edit-distance').value,
            pace: document.getElementById('edit-pace').value,
            rest: document.getElementById('edit-rest').value,
            purpose: document.getElementById('edit-purpose').value,
            memo: document.getElementById('edit-memo').value,
            fatigue: parseInt(document.getElementById('edit-fatigue').value),
            achievement: parseInt(document.getElementById('edit-achievement').value),
            tags: checkedTags
        };

        saveData();
        renderApp();
        closeModal();
    }

    // --- Utils ---
    function formatDate(d) {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // --- Export / Import / Reset ---
    function exportData() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `saisoku_plan_${currentYear}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                appData = data;
                saveData();
                renderApp();
                alert("データをインポートしました。");
            } catch (err) {
                alert("ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。");
            }
        };
        reader.readAsText(file);
    }

    function resetData() {
        if(confirm("すべてのデータを初期状態にリセットしますか？この操作は取り消せません。")) {
            generateSampleData();
            saveData();
            renderApp();
        }
    }

    // Run
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
