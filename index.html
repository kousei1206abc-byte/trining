<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>最速計画｜編集できるトレーニングメニュー</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --main: #2563eb;
      --sub: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --line: #e5e7eb;
      --shadow: 0 14px 30px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: linear-gradient(135deg, #1d4ed8, #06b6d4);
      color: white;
      padding: 28px 18px 36px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 42px); }
    .lead { margin: 0; opacity: .92; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }
    button, select, input, textarea {
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--line);
    }
    button {
      cursor: pointer;
      border: 0;
      padding: 10px 14px;
      background: var(--main);
      color: white;
      font-weight: 700;
    }
    button.secondary { background: #334155; }
    button.good { background: var(--sub); }
    button.warn { background: var(--warn); }
    button.danger { background: var(--danger); }
    main { margin-top: -22px; padding: 0 14px 32px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .stat-title { color: var(--muted); font-size: 13px; }
    .stat-value { font-size: 26px; font-weight: 900; margin-top: 6px; }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      flex-wrap: wrap;
    }
    .month-title { font-weight: 900; font-size: 24px; }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .dow {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      padding: 8px 0;
    }
    .day {
      min-height: 122px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      position: relative;
      box-shadow: 0 6px 14px rgba(15, 23, 42, .04);
    }
    .day.empty { opacity: .35; }
    .date { font-weight: 900; }
    .today { outline: 3px solid rgba(37,99,235,.25); }
    .menu-title { margin-top: 6px; font-weight: 800; font-size: 14px; }
    .menu-detail { color: var(--muted); font-size: 12px; margin-top: 3px; white-space: pre-wrap; }
    .tag {
      display: inline-block;
      font-size: 11px;
      background: #dbeafe;
      color: #1e40af;
      border-radius: 999px;
      padding: 3px 7px;
      margin: 5px 4px 0 0;
      font-weight: 800;
    }
    .fatigue { position: absolute; right: 8px; top: 8px; font-size: 12px; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 50;
    }
    .modal.open { display: flex; }
    .panel {
      width: min(720px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: white;
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    label { display: block; font-weight: 800; font-size: 13px; margin-bottom: 5px; }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      background: #f8fafc;
    }
    textarea { min-height: 86px; resize: vertical; }
    .full { grid-column: 1 / -1; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; flex-wrap: wrap; }
    .notice {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .calendar { gap: 5px; }
      .day { min-height: 98px; padding: 7px; }
      .menu-detail { display: none; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>最速計画｜1年間トレーニングメニュー</h1>
      <p class="lead">スマホでも編集可能。保存するとこの端末に残り、共有リンクで他の人にも見せられます。</p>
      <div class="toolbar">
        <button onclick="makeShareLink()" class="good">共有リンクを作る</button>
        <button onclick="exportJSON()" class="secondary">バックアップ</button>
        <button onclick="document.getElementById('importFile').click()" class="secondary">インポート</button>
        <button onclick="resetAll()" class="danger">リセット</button>
        <input id="importFile" type="file" accept="application/json" hidden onchange="importJSON(event)" />
      </div>
      <div id="shareNotice" class="notice"></div>
    </div>
  </header>

  <main class="wrap">
    <section class="stats">
      <div class="card"><div class="stat-title">今日の練習</div><div id="todayMenu" class="stat-value">--</div></div>
      <div class="card"><div class="stat-title">今月の走行距離</div><div id="monthKm" class="stat-value">0 km</div></div>
      <div class="card"><div class="stat-title">今週のポイント練習</div><div id="weekPoint" class="stat-value">0 回</div></div>
      <div class="card"><div class="stat-title">今月の達成率</div><div id="monthRate" class="stat-value">0%</div></div>
    </section>

    <section class="card">
      <div class="controls">
        <button onclick="moveMonth(-1)">◀ 前月</button>
        <div id="monthTitle" class="month-title">--月</div>
        <button onclick="moveMonth(1)">次月 ▶</button>
        <button onclick="goToday()" class="secondary">今日に戻る</button>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="panel">
      <div class="controls">
        <h2 id="editDate">日付の編集</h2>
        <button class="secondary" onclick="closeModal()">✕</button>
      </div>
      <div class="form-grid">
        <div class="full">
          <label>練習タイトル</label>
          <input id="title" placeholder="例：1000m×5 / 20km走 / 回復ジョグ" />
        </div>
        <div>
          <label>タグ</label>
          <input id="tag" placeholder="例：閾値, スピード持久, 回復" />
        </div>
        <div>
          <label>距離 km</label>
          <input id="km" type="number" step="0.1" placeholder="例：12" />
        </div>
        <div>
          <label>設定ペース</label>
          <input id="pace" placeholder="例：3'20/km、72秒/400m" />
        </div>
        <div>
          <label>レスト</label>
          <input id="rest" placeholder="例：90秒、400m jog" />
        </div>
        <div class="full">
          <label>メニュー内容</label>
          <textarea id="content" placeholder="例：アップ3km→1000m×5→ダウン2km"></textarea>
        </div>
        <div class="full">
          <label>目的</label>
          <textarea id="purpose" placeholder="例：LT向上、1500m後半の粘り強化"></textarea>
        </div>
        <div class="full">
          <label>メモ</label>
          <textarea id="memo" placeholder="体調・反省・タイムなど"></textarea>
        </div>
        <div>
          <label>疲労度 1〜5</label>
          <input id="fatigue" type="range" min="1" max="5" value="3" oninput="fatigueValue.textContent=this.value" />
          <strong id="fatigueValue">3</strong>/5
        </div>
        <div>
          <label>達成度 %</label>
          <input id="done" type="number" min="0" max="100" value="0" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="danger" onclick="deleteDay()">この日を削除</button>
        <button class="secondary" onclick="closeModal()">キャンセル</button>
        <button class="good" onclick="saveDay()">保存する</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "training_site_v2";
    const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
    let current = new Date();
    let selectedKey = "";
    let data = {};

    function ymd(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function loadData() {
      try {
        const hash = location.hash.startsWith("#data=") ? location.hash.slice(6) : "";
        if (hash) {
          data = JSON.parse(decodeURIComponent(atob(hash)));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          history.replaceState(null, "", location.pathname + location.search);
          document.getElementById("shareNotice").textContent = "共有リンクの内容を読み込みました。";
          return;
        }
        data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch (e) {
        data = {};
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function render() {
      const cal = document.getElementById("calendar");
      cal.innerHTML = "";
      weekdays.forEach(w => {
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = w;
        cal.appendChild(div);
      });

      const year = current.getFullYear();
      const month = current.getMonth();
      document.getElementById("monthTitle").textContent = `${year}年${month + 1}月`;

      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      for (let i = 0; i < first.getDay(); i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        cal.appendChild(empty);
      }
      for (let day = 1; day <= last.getDate(); day++) {
        const date = new Date(year, month, day);
        const key = ymd(date);
        const item = data[key] || {};
        const div = document.createElement("div");
        div.className = "day" + (key === ymd(new Date()) ? " today" : "");
        div.onclick = () => openModal(key);
        const tags = (item.tag || "").split(",").map(t => t.trim()).filter(Boolean).map(t => `<span class="tag">\${escapeHTML(t)}</span>`).join("");
        div.innerHTML = `
          <div class="date">${day}</div>
          \${item.fatigue >= 4 ? \`<div class="fatigue">⚠️</div>\` : ""}
          <div class="menu-title">\${escapeHTML(item.title || "")}</div>
          <div>\${tags}</div>
          <div class="menu-detail">\${escapeHTML(item.content || item.pace || "")}</div>
        `;
        cal.appendChild(div);
      }
      updateStats();
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>'"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\\"":"&quot;"}[s]));
    }

    function updateStats() {
      const today = data[ymd(new Date())];
      document.getElementById("todayMenu").textContent = today?.title || "--";
      const y = current.getFullYear();
      const m = current.getMonth();
      const monthItems = Object.entries(data).filter(([key]) => {
        const d = new Date(key + "T00:00:00");
        return d.getFullYear() === y && d.getMonth() === m;
      }).map(([, v]) => v);
      const km = monthItems.reduce((sum, v) => sum + Number(v.km || 0), 0);
      const rateItems = monthItems.filter(v => v.title);
      const rate = rateItems.length ? Math.round(rateItems.reduce((s, v) => s + Number(v.done || 0), 0) / rateItems.length) : 0;
      const now = new Date();
      const start = new Date(now);
      start.setDate(now.getDate() - now.getDay());
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const point = Object.entries(data).filter(([key, v]) => {
        const d = new Date(key + "T00:00:00");
        const tag = v.tag || "";
        return d >= start && d <= end && /ポイント|閾値|スピード|レース|インターバル|ペース/.test(tag + v.title);
      }).length;
      document.getElementById("monthKm").textContent = `\${km.toFixed(km % 1 ? 1 : 0)} km`;
      document.getElementById("monthRate").textContent = `\${rate}%`;
      document.getElementById("weekPoint").textContent = `\${point} 回`;
    }

    function openModal(key) {
      selectedKey = key;
      const item = data[key] || {};
      document.getElementById("editDate").textContent = `\${key} の編集`;
      ["title","tag","km","pace","rest","content","purpose","memo","done"].forEach(id => document.getElementById(id).value = item[id] || "");
      document.getElementById("fatigue").value = item.fatigue || 3;
      document.getElementById("fatigueValue").textContent = item.fatigue || 3;
      document.getElementById("modal").classList.add("open");
    }
    function closeModal() { document.getElementById("modal").classList.remove("open"); }
    function saveDay() {
      data[selectedKey] = {
        title: title.value,
        tag: tag.value,
        km: km.value,
        pace: pace.value,
        rest: rest.value,
        content: content.value,
        purpose: purpose.value,
        memo: memo.value,
        fatigue: fatigue.value,
        done: done.value
      };
      saveData();
      closeModal();
      render();
    }
    function deleteDay() {
      delete data[selectedKey];
      saveData();
      closeModal();
      render();
    }
    function moveMonth(n) { current.setMonth(current.getMonth() + n); render(); }
    function goToday() { current = new Date(); render(); }

    async function makeShareLink() {
      try {
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        const url = `\${location.origin}\${location.pathname}#data=\${encoded}`;
        await navigator.clipboard.writeText(url);
        document.getElementById("shareNotice").textContent = "共有リンクをコピーしました。LINEなどにそのまま貼れます。";
      } catch (e) {
        document.getElementById("shareNotice").textContent = "共有リンク作成に失敗しました。データが多すぎる可能性があります。";
      }
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "training-backup.json";
      a.click();
    }
    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          data = JSON.parse(reader.result);
          saveData();
          render();
        } catch (e) { alert("読み込み失敗"); }
      };
      reader.readAsText(file);
    }
    function resetAll() {
      if (!confirm("本当に全部消す？")) return;
      data = {};
      saveData();
      render();
    }

    loadData();
    render();
  </script>
</body>
</html>
